<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/webp" href="logo_.webp">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Online Quran College</title>
  
  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #006847;
      --primary-hover: #004f36;
      --secondary: #10b981;
      --secondary-light: #eefaf3;
      --dark: #0f172a;
      --dark-slate: #1f2937;
      --light: #ffffff;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --font-title: 'Outfit', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius-md: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-lg: 0 20px 40px -10px rgba(0, 104, 71, 0.1), 0 12px 16px -8px rgba(0, 104, 71, 0.06);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-body);
      color: var(--dark-slate);
      background: linear-gradient(135deg, var(--secondary-light) 0%, rgba(255, 255, 255, 1) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background-color: var(--light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-img {
      max-height: 64px;
      width: auto;
      margin-bottom: 16px;
    }
    
    .login-title {
      font-family: var(--font-title);
      font-size: 24px;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      font-size: 14px;
      color: var(--gray-600);
    }
    
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      font-family: var(--font-title);
      font-weight: 600;
      font-size: 13.5px;
      color: var(--primary);
      margin-bottom: 8px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-600);
      font-size: 16px;
    }
    
    .form-control {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14.5px;
      padding: 12px 16px 12px 44px;
      border-radius: 8px;
      border: 1px solid var(--gray-300);
      background-color: var(--gray-100);
      color: var(--dark-slate);
      outline: none;
      transition: var(--transition);
    }
    
    .form-control:focus {
      border-color: var(--primary);
      background-color: var(--light);
      box-shadow: 0 0 0 4px rgba(0, 104, 71, 0.08);
    }
    
    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: var(--primary);
      color: var(--light);
      border: none;
      border-radius: 50px;
      font-family: var(--font-title);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(0, 104, 71, 0.2);
    }
    
    .btn-submit:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 104, 71, 0.25);
    }
    
    .error-alert {
      background-color: #fee2e2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 12px;
      border-radius: 8px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    
    .success-alert {
      background-color: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    
    .back-home {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13.5px;
      color: var(--gray-600);
      text-decoration: none;
      transition: var(--transition);
    }
    
    .back-home:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <a href="/">
        <img src="logo_.webp" alt="Online Quran College Logo" class="logo-img">
      </a>
      <h1 class="login-title">Admin Dashboard Login</h1>
      <p class="login-subtitle">Enter your admin credentials to publish and manage blog posts</p>
    </div>
    
    <div class="error-alert" id="errorAlert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errorMessage">Invalid email or password.</span>
    </div>
    
    <div class="success-alert" id="successAlert">
      <i class="fa-solid fa-circle-check"></i>
      <span>Login successful! Redirecting...</span>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" class="form-control" placeholder="tech.iqratech@gmail.com" required autocomplete="username">
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      
      <button type="submit" class="btn-submit" id="btnSubmit">
        <span>Login</span>
        <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </form>
    
    <a href="/" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Homepage</a>
  </div>

  <script src="blog-db.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');
      const btnSubmit = document.getElementById('btnSubmit');
      
      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';
      
      // Load users from OQC_DB
      const users = OQC_DB.getUsers();
      const matchedUser = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
      
      if (matchedUser) {
        successAlert.style.display = 'flex';
        btnSubmit.disabled = true;
        btnSubmit.style.opacity = '0.7';
        
        // Save session in localStorage
        localStorage.setItem('admin_logged_in', 'true');
        localStorage.setItem('admin_logged_in_email', matchedUser.email);
        localStorage.setItem('admin_logged_in_role', matchedUser.role);
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      } else {
        errorAlert.style.display = 'flex';
      }
    });
  </script>

</body>
</html>
